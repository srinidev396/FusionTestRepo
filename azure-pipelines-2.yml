trigger:
  branches:
    include:     
      - 

pool:
  name: Default

stages:
- stage: Build
  displayName: 'Build, Test and Publish Artifact'
  jobs:
  - job: CI
    displayName: 'Continuous Integration'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET Core sdk'
      inputs:
        packageType: 'sdk'
        version: '8.x'  

    - script: dotnet restore
      displayName: 'Restore dependencies'

    - script: dotnet build --configuration Release
      displayName: 'Build application'

   
    - script: dotnet publish --configuration Release --output $(Build.ArtifactStagingDirectory)
      displayName: 'Publish Application'  
      

    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        pathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: Container

- stage: Deploy
  displayName: 'Publish Artifact'
  #displayName: 'Deploy to Azure Web App'
  dependsOn: Build
  jobs:
  - job: CD
    displayName: 'Continuous Deployment'
    steps:
    - download: current
      artifact: drop
      displayName: 'Download Build Artifacts'

    - task: UseDotNet@2
      displayName: 'Install .NET Core sdk'
      inputs:
        packageType: 'sdk'
        version: '8.x'  

    - task: DotNetCoreCLI@2
      displayName: 'Publish Artifact'
      #displayName: 'Publish to Azure Web App'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - task: AzureRmWebAppDeployment@4
      #displayName: 'Azure Web App Deploy'
      displayName: 'Publish Artifact'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'Azure_DevOps_Service_Connection'
        appType: 'webApp'
        WebAppName: 'webapp-apitest-cc-fusionapi-001'
        package: '$(Pipeline.Workspace)/drop'
