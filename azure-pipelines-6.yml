trigger:
- main

pool:
  name: Default

variables:
- group: My variable Group

steps:

- powershell: |
    $ErrorActionPreference = "Stop"

    $organization = "https://dev.azure.com/tabpipelines/"
    $project = "TAB_API_POC"
    $feed = "test-01"
    $baseName = "fusionwebapi_1.0."
    $version = "0.0.6"  

   
    $dateTime = Get-Date -Format "yyyyMMddHHmm"

   
    $artifactName = $baseName + "003" + "_" + $dateTime

   
    $pathToPublish = "$(Build.ArtifactStagingDirectory)"

    $pat = "${env:pat}"

    if (-not $pat) {
        Write-Error "PAT not found. Ensure the PAT variable is set correctly in the pipeline."
        exit 1
    }

   
    $env:AZURE_DEVOPS_EXT_PAT = $pat

    
    Write-Host "Configuring default organization and project..."
    az devops configure --defaults organization=$organization project=$project

    
    Write-Host "Checking if user is authenticated..."
    az devops user show

    if ($LASTEXITCODE -ne 0) {
        Write-Error "Authentication failed. Ensure the PAT has the correct permissions."
        exit 1
    }

   
    Write-Host "Publishing artifact..."
    az artifacts universal publish --organization $organization `
                                   --project $project `
                                   --feed $feed `
                                   --scope 'project' `
                                   --name $artifactName `
                                   --version $version `
                                   --path $pathToPublish `
                                   --description "fusionwebapi artifact"

    
    Write-Host "Published artifact: $artifactName"
  displayName: 'Publish Artifact'
  env:
    pat: $(pat)
