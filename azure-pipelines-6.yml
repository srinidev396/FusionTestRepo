trigger:
  branches:
    include:
      - 

pool:
  name: Default

stages:
- stage: Build
  displayName: 'Build, Test and Publish Artifact'
  jobs:
  - job: CI
    displayName: 'Continuous Integration'
    steps:
      - task: UseDotNet@2
        displayName: 'Install .NET Core sdk'
        inputs:
          packageType: 'sdk'
          version: '8.x'

      - script: dotnet restore
        displayName: 'Restore dependencies'

      - script: dotnet build --configuration Release
        displayName: 'Build application'

      - script: dotnet publish --configuration Release --output $(Build.ArtifactStagingDirectory)
        displayName: 'Publish Application'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Build Artifacts'
        inputs:
          pathToPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: 'drop'  
      
     
          
- stage: DeployToAzureArtifacts  
  displayName: 'Push Artifacts from local to Azure Artifacts'
  dependsOn: Build  
  jobs:
  - job: PushLocalArtifacts
    displayName: 'Push Local Artifacts'
    steps:
    
      - script: | # logging step
          echo " Copying Local build artifacts to $(Build.ArtifactStagingDirectory):"
          xcopy  F:\agent\_work\3\drop\* $(Build.ArtifactStagingDirectory)
        displayName: 'Copying Local Artifacts'
        

      - script: | # logging step
          echo " ** Contents of $(Build.ArtifactStagingDirectory):"
          dir /b /s $(Build.ArtifactStagingDirectory)
        displayName: 'List files in Build.ArtifactStagingDirectory'
        
      - task: PublishBuildArtifacts@1  
        inputs:
          pathToPublish: '$(Build.ArtifactStagingDirectory)'
         
      - script: | # logging step
          echo " ** Contents of $(Build.ArtifactStagingDirectory):"
          az artifacts universal publish --organization https://dev.azure.com/tabpipelines/ --feed tabpipelines --name fusionwebapi_1.0.003 --version 0.0.8 --description "Welcome to Universal Packages" --path F:\agent\_work\3\drop\
    
        displayName: 'Publish to Azure Artifacts'   
